<!DOCTYPE html>
<html lang="uk">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="alternate" hreflang="uk" href="https://snab.kiev.ua/ua/index" />
<link rel="alternate" hreflang="ru" href="https://snab.kiev.ua/ru/index" />

  <title>Вибір мови | Language Selection</title>
  <meta name="google-site-verification" content="cTFtLF7OlmvxmOUiu9wMaD352FnQjik2_nyrEiIfiHg" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding-top: 10vh;
      margin: 0;
    }

    .container {
      background: white;
      display: inline-block;
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin-bottom: 30px;
      font-size: 28px;
      color: #333;
    }

    .lang-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .lang-btn {
      padding: 15px 25px;
      font-size: 16px;
      text-decoration: none;
      color: white;
      border-radius: 8px;
      background: #007bff;
      transition: background 0.3s ease;
    }

    .lang-btn:hover {
      background: #0056b3;
    }

    .flag {
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>



<body>



  <div class="container">
    <h1>Оберіть мову / Choose your language</h1>
    <div class="lang-buttons">
      <a class="lang-btn" href="/ua/index">
        🇺🇦 Українська
      </a>
      <a class="lang-btn" href="/ru/index">
        🌐 RU (без прапора)
      </a>
    </div>
  </div>
</body>
