
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preload" href="/fonts/montserrat/Montserrat-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/montserrat/Montserrat-Light.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/montserrat/Montserrat-Medium.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/montserrat/Montserrat-SemiBold.woff2" as="font" type="font/woff2" crossorigin>

<style>
	* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

ul,
li {
	list-style-type: none;
	margin: 0;
	padding: 0;
}

h1,
h2 {
	margin: 0;
}

a {
	text-decoration: none;
	color: inherit;
	display: inline-block;
}

p {
	margin: 0;
	padding: 0;
}

@font-face {
	font-family: "Montserrat";
	src: url("/fonts/montserrat/Montserrat-Light.woff2") format("woff2");
	font-weight: 300;
	font-style: normal;
	font-display: swap;
}

@font-face {
	font-family: "Montserrat";
	src: url("/fonts/montserrat/Montserrat-Regular.woff2") format("woff2");
	font-weight: 400;
	font-style: normal;
	font-display: swap;
}

@font-face {
	font-family: "Montserrat";
	src: url("/fonts/montserrat/Montserrat-Medium.woff2") format("woff2");
	font-weight: 500;
	font-style: normal;
	font-display: swap;
}

@font-face {
	font-family: "Montserrat";
	src: url("/fonts/montserrat/Montserrat-SemiBold.woff2") format("woff2");
	font-weight: 600;
	font-style: normal;
	font-display: swap;
}

body {
	font-weight: 400;
    font-family: "Montserrat", "Segoe UI", "Roboto", sans-serif;
	font-size: 14px;
	line-height: 1.57;
	color: #1D1D1D;
	background-color: #FFF;
}

.app {
	padding: 0;
	max-width: 1440px;
	margin: 0 auto;
	min-height: 100vh;
	display: flex;
	flex-direction: column;
}

h1,
h2,
h3 {
	color: #1D1D1D;
}

h1 {
	font-weight: 600;
	font-size: 2rem;
	line-height: 2rem;
	padding: 50px 0 25px 0;
}

@media screen and (max-width: 768px) {
	h1 {
		font-size: 1.5rem;
		line-height: 1.5rem;
		padding: 25px 0 12px 0;
	}
}

h2 {
	font-weight: 500;
	font-size: 1.875rem;
	line-height: 1.875rem;
	padding: 30px 0 15px 0;
}

@media screen and (max-width: 768px) {
	h2 {
		font-size: 1.25rem;
		line-height: 1.25rem;
		padding: 15px 0 7px 0;
	}
}
h3 {
	font-weight: 500;
	font-size: 1.7rem;
	line-height: 1.7rem;
	padding: 25px 0 12px 0;
}
@media screen and (max-width: 768px) {
	h3 {
		font-size: 1.2rem;
		line-height: 1.2rem;
		padding: 15px 0 7px 0;
	}
}

p {
	font-weight: 300;
	font-size: 1rem;
	line-height: 1.6rem;
	color: #706F6D;
	padding: 10px 0;
}

.header {
	width: 100%;
	height: 80px;
	position: sticky;
	top: 0;
	z-index: 11;
	border-bottom: 1px solid #989898;
}

.header-menu {
	display: flex;
	height: 80px;
	justify-content: space-between;
	align-items: center;
	flex-grow: 1;
}

.header-list {
	position: relative;
	display: flex;
	justify-content: center;
	gap: 30px;
	color: #706F6D;
}

.header-list a {
	position: relative;
}

.header-list a::before {
	content: "";
	position: absolute;
	width: 0%;
	height: 1px;
	bottom: -3px;
	left: 50%;
	background-color: #1D1D1D;
}

.header-item {
	padding: 10px 0;
}

.sub-list {
	display: none;
	width: 400px;
	margin-top: 0;
	position: absolute;
	top: 30px;
	background-color: #f7f7f7;
	padding: 30px;
}

.header-link {
	font-size: 1rem;
	text-transform: uppercase;
}

.sub-item {
	padding: 5px 0;
}

.sub-link {
	text-transform: none;
}

.header-contact {
	display: flex;
	gap: 20px;
}

.header-contact img {
	width: 34px;
	height: 34px;
}

.header-burger {
	display: none;
	width: 24px;
	height: 13px;
	margin: 25px 5px 25px 10px;
	position: relative;
}

.header-burger span {
	width: 100%;
	height: 2px;
	background-color: #000;
}

.header-burger::before,
.header-burger::after {
	background-color: #000;
	content: "";
	height: 2px;
	position: absolute;
	width: 100%;
}

.header-burger::before {
	top: 0;
}

.header-burger::after {
	bottom: 0;
}

@media (max-width: 768px) {
	.header-burger {
		display: flex;
		justify-content: center;
		align-items: center;
	}

	.header-list {
		flex-direction: column;
		gap: 18px;
		background-color: #1D1D1D;
		width: 100%;
		height: 100%;
		position: fixed;
		top: 78px;
		left: -100%;
		color: #FFF;
		padding-left: 20px;
		justify-content: flex-start;
		padding-top: 30px;
	}

	.sub-list {
		color: #1D1D1D;
		position: static;
	}
}

.language-switcher {
	font-size: 1rem;
	text-transform: uppercase;
}

@media (min-width: 769px) {
	.header-item {
		position: relative;
	}

	.sub-list {
		position: absolute;
		top: 100%;
		left: 0;
		background-color: white;
		display: none;
		opacity: 0;
		visibility: hidden;
		transform: translateY(10px);
		z-index: 10;
		box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
		padding: 10px 0;
	}

	.sub-list .sub-item {
		padding: 0 20px;
		white-space: nowrap;
	}

	.sub-list .sub-link {
		display: block;
		padding: 8px 0;
		text-decoration: none;
	}
}

.rule li {
	font-style: normal;
	font-weight: 300;
	font-size: 18px;
	line-height: 24px;
	color: #706F6D;
	list-style-position: outside;
	padding: 0 0 10px 0;
	margin: 0 0 0 10px;
}

.container {
	max-width: 1440px;
	padding: 0 110px;
}

@media (max-width: 1200px) {
	.container {
		padding: 0 50px;
	}
}

@media (max-width: 820px) {
	.container {
		padding: 0 15px;
	}
}
</style>
